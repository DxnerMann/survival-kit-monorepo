spring.datasource.url=jdbc:postgresql://database:5432/${POSTGRES_NAME}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION}

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

logging.level.org.flywaydb=ERROR
logging.level.org.springframework.boot.autoconfigure.flyway=ERROR
logging.level.org.springframework.boot.context.config=ERROR
logging.level.root=ERROR

#redis
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.host=redis
spring.data.redis.port=6379